[main]
font=monospace:size=16
dpi-aware=yes
pad=8x6
shell=/usr/bin/fish
selection-target=both

[colors-dark]
background=000000
foreground=dddddd
cursor=000000 b03060
selection-background=333333
selection-foreground=dddddd
regular0=000000
regular1=b03060
regular2=66cdaa
regular3=ffe4b5
regular4=584daf
regular5=bb66dd
regular6=add8e6
regular7=bebebe
bright0=a9a9a9
bright1=d05090
bright2=7fffd4
bright3=ffe4b5
bright4=8373ea
bright5=e47fff
bright6=add8e6
bright7=ffffff

[cursor]
style=beam
beam-thickness=2px

[key-bindings]
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
unicode-input=none
show-urls-launch=Control+Shift+u
show-urls-copy=Control+Shift+y

[url]
launch=xdg-open ${url}
osc8-underline=url-mode
style=dotted

[csd]
preferred=server
size=32
font=monospace:size=16
color=ff0d0d0d
button-color=ffdddddd
button-minimize-color=ff000000
button-maximize-color=ff000000
button-close-color=ffb03060
border-color=ff333333
border-width=0
