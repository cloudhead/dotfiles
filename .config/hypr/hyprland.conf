# Plain Hyprland trial config with xmonad-like bindings.

$mod = SUPER
$terminal = foot
$bar = waybar
$menu = fuzzel
$active = rgba(404040ff)
$dim = rgba(101010ff)

monitor = , preferred, auto, 1.5

env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland;xcb

# Start one terminal when the session opens.
exec-once = $terminal
# Start the bottom status bar with Hyprland workspace support.
exec-once = $bar
# Set the desktop wallpaper.
exec-once = hyprpaper
# Keep the screenshot tray helper available for the Print binding.
exec-once = flameshot
# Store copied text in the clipboard history.
exec-once = wl-paste --type text --watch cliphist store
# Store copied images in the clipboard history.
exec-once = wl-paste --type image --watch cliphist store

input {
    kb_layout = us
    kb_variant = altgr-intl
    follow_mouse = 1
    repeat_rate = 40
    repeat_delay = 180
    sensitivity = -0.1
}

general {
    layout = master
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border = $active
    col.inactive_border = $dim
    resize_on_border = true
}

decoration {
    rounding = 0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    on_focus_under_fullscreen = 1
}

ecosystem {
    no_update_news = true
}

master {
    mfact = 0.60
    new_status = slave
    new_on_active = after
    new_on_top = false
    orientation = left
}

# xmonad defaults, translated to Hyprland's master layout.
bind = $mod SHIFT, Return, exec, $terminal
bind = $mod, P, exec, $menu
bind = $mod SHIFT, C, killactive
bind = $mod, Space, layoutmsg, orientationnext
bind = $mod, N, layoutmsg, orientationleft
bind = $mod, Tab, workspace, previous
bind = $mod SHIFT, Tab, layoutmsg, cyclenext prev
bind = $mod, J, layoutmsg, cyclenext
bind = $mod, K, layoutmsg, cyclenext prev
bind = $mod, M, layoutmsg, focusmaster
bind = $mod, Return, layoutmsg, swapwithmaster
bind = $mod SHIFT, J, layoutmsg, swapnext
bind = $mod SHIFT, K, layoutmsg, swapnext prev
bind = $mod, H, layoutmsg, mfact -0.05
bind = $mod, L, layoutmsg, mfact +0.05
bind = $mod, T, settiled
bind = $mod, comma, layoutmsg, addmaster
bind = $mod, period, layoutmsg, removemaster
bind = $mod SHIFT, Q, exit
bind = $mod, Q, exec, hyprctl reload

# Existing practical bindings retained from the Sway setup.
bind = $mod, X, exec, swaylock -f -c 000000
bind = $mod SHIFT, L, exec, sh -c 'cliphist list | fuzzel --dmenu --width 100 | cliphist decode | wl-copy'
bind = $mod, F, fullscreen, 1
bind = $mod SHIFT, F, fullscreen
bind = $mod SHIFT, minus, movetoworkspacesilent, special
bind = $mod, minus, togglespecialworkspace
bind = , Print, exec, flameshot gui

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# xmonad's W/E/R screen bindings, using Hyprland monitor indexes.
bind = $mod, W, focusmonitor, 0
bind = $mod, E, focusmonitor, 1
bind = $mod, R, focusmonitor, 2
bind = $mod SHIFT, W, movewindow, mon:0
bind = $mod SHIFT, E, movewindow, mon:1
bind = $mod SHIFT, R, movewindow, mon:2

bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

windowrule = match:class ^(org.keepassxc.KeePassXC)$, float on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^(org.telegram.desktop)$, float on
windowrule = match:class ^(org.telegram.desktop)$, border_size 0
