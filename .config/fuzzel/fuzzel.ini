[main]
font=monospace:size=14
dpi-aware=no
terminal=foot -e
prompt="> "
width=40
lines=12
horizontal-pad=18
vertical-pad=12
inner-pad=8
line-height=24
icons-enabled=yes

[colors]
background=000000ee
text=ddddddff
prompt=ddddddff
input=ddddddff
match=ffffffff
selection=202020ff
selection-text=ddddddff
selection-match=ffffffff
counter=2f2f2fff
border=2f2f2fff

[border]
width=1
radius=0
selection-radius=0
